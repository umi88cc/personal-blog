name = "blog-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"


# D1 数据库
[[d1_databases]]
binding = "DB"
database_name = "umi88"
database_id = "fa026663-aba7-43f2-9f28-54a168acc305"

# KV 缓存
[[kv_namespaces]]
binding = "CACHE"
id = "435083bae08f48baa8e4122473ce8a3f"

# R2 存储
[[r2_buckets]]
binding = "STORAGE"
bucket_name = "umi88"

# 日志配置
[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

# 定时任务触发器
[triggers]
crons = ["0 8 * * *", "0 9 * * 1"]

# 环境变量（公开的配置）
[vars]
ENVIRONMENT = "production"
FRONTEND_URL = "https://umi88.cc"
STORAGE_PUBLIC_URL = "https://storage.blog.wort.uk"

# Secrets（需要通过命令行或Cloudflare Dashboard设置）
# wrangler secret put JWT_SECRET
# wrangler secret put POST_PASSWORD_SECRET  # 文章密码访问 Token 密钥（可选，默认使用 JWT_SECRET）
# wrangler secret put GITHUB_CLIENT_ID
# wrangler secret put GITHUB_CLIENT_SECRET

# 或者在Cloudflare Dashboard设置:
# Workers & Pages > blog-api > Settings > Variables
# 添加以下环境变量（加密）：
# - JWT_SECRET: 用户认证 JWT 密钥
# - POST_PASSWORD_SECRET: 文章密码访问 Token 密钥（可选）
# - GITHUB_CLIENT_ID: GitHub OAuth Client ID
# - GITHUB_CLIENT_SECRET: GitHub OAuth Client Secret
